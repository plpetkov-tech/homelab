---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vexxy
  namespace: flux-system
spec:
  interval: 15m
  timeout: 15m
  chart:
    spec:
      chart: devops/helm/vexxy
      sourceRef:
        kind: GitRepository
        name: vexxy
        namespace: flux-system
  targetNamespace: vexxy
  install:
    crds: CreateReplace
    replace: true
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    force: true
    remediation:
      retries: 3
  values:
    global:
      namespace: vexxy
      sandboxNamespace: vexxy-sandbox
      environment: development
      imageRegistry: ghcr.io/plpetkov-tech
      imagePullPolicy: IfNotPresent
      imagePullSecrets:
        - name: vexxy-pull-secret
      licensing:
        enabled: false
      secrets:
        main: vexxy-secrets
        oauth: oauth-secrets
        jwtKeys: jwt-keys
        license: vexxy-license
      database:
        host: vexxy-postgres
        port: 5432
        name: vexxy
      redis:
        host: vexxy-redis
        port: 6379

    secrets:
      devMode: true
      provider: "kubernetes"

    infrastructure:
      postgres:
        image:
          repository: postgres
          tag: "16-alpine"
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
        storage:
          size: 5Gi
          storageClass: local-path
        backup:
          enabled: false
      redis:
        image:
          repository: redis
          tag: "7-alpine"
        password: ""
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

    vexxy-api:
      replicaCount: 1
      image:
        tag: "v0.1.3"
      service:
        type: ClusterIP
        port: 8000
      config:
        environment: development
        corsOrigins: '["*"]'
        premiumAnalysisEnabled: "true"
        oauthEnabled: "false"
        licensingEnabled: "false"
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
      hpa:
        enabled: false
      pdb:
        enabled: false
      networkPolicy:
        enabled: false

    vexxy-worker:
      replicaCount: 1
      image:
        tag: "v0.1.3"
      concurrency: 4
      queues: "celery,enrichment,ingestion,analysis"
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
      hpa:
        enabled: false

    vexxy-beat:
      image:
        tag: "v0.1.3"
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi

    vexxy-frontend:
      replicaCount: 1
      image:
        tag: "v0.1.3"
      service:
        type: ClusterIP
        port: 80
      apiBackendUrl: "http://vexxy-api:8000"
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

    vexxor:
      enabled: true
      image:
        tag: "v0.1.3"
      port: 8080
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      storage:
        size: 5Gi
        storageClass: local-path

    kickstart:
      enabled: true
      image:
        tag: "v0.1.3"
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi

    ingress:
      enabled: false

    monitoring:
      enabled: false
